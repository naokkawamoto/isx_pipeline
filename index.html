<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InsightScanX — Pipeline Storyboard</title>
</head>
<body>
<meta charset="utf-8">
<style>
  :root{
    --side:#212c3a; --side2:#2c3948; --side-tx:#aeb9c7; --side-tx2:#e7ecf2;
    --navy:#2b3a72; --navy2:#33468a; --teal:#15a594; --teal-d:#0f8577;
    --page:#f5f7f9; --card:#ffffff; --border:#e6e9ee; --ink:#1e2732; --mute:#6a7686;
    --ok:#16a34a; --warn:#d68a1a; --bad:#d64545; --amber:#e7b53c;
    --purple:#a5348a; --thick:#37617a; --thin:#5b8aa6;
    --viewA:#3f4e5f; --viewB:#2a3644;
  }
  *{box-sizing:border-box}
  #app{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--ink);background:#dfe3e8;min-height:100vh;display:flex;flex-direction:column}
  .stage{display:flex;align-items:center;justify-content:center;padding:14px 14px 4px}
  .frame-wrap{width:100%;max-width:1180px;aspect-ratio:1180/612;background:var(--page);border-radius:12px;
    box-shadow:0 10px 40px rgba(20,30,45,.28);overflow:hidden;display:flex;position:relative}
  /* sidebar */
  .side{width:186px;background:var(--side);color:var(--side-tx);display:flex;flex-direction:column;flex:none;font-size:12.5px}
  .brand{display:flex;align-items:center;gap:8px;padding:14px 14px 8px}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--teal),#0c6f63);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .brand b{color:#fff;font-size:14px;letter-spacing:.2px}
  .org{margin:2px 12px 10px;background:var(--side2);border-radius:7px;padding:7px 9px;display:flex;align-items:center;gap:7px;color:#cdd6e0;font-size:11.5px}
  .org .dot{width:14px;height:14px;border-radius:4px;background:#3b4a5c}
  .back{padding:6px 14px;color:#8895a6;font-size:11.5px}
  .nav{display:flex;flex-direction:column;padding:4px 8px;gap:2px}
  .nav a{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;color:var(--side-tx);text-decoration:none;position:relative}
  .nav a.on{background:var(--side2);color:#fff}
  .nav a.on::after{content:"";position:absolute;right:-8px;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--teal)}
  .nav svg{width:15px;height:15px;opacity:.9}
  .side-foot{margin-top:auto;padding:10px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid #2b3746}
  .ava{width:24px;height:24px;border-radius:50%;background:#41516333;border:1px solid #4a5b6e;display:flex;align-items:center;justify-content:center;color:#cdd6e0;font-size:11px}
  /* main col */
  .col{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{height:44px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12.5px;color:var(--mute)}
  .crumb{display:flex;align-items:center;gap:7px}
  .crumb .s{color:#aab3bf}
  .crumb b{color:var(--ink)}
  .top .sp{flex:1}
  .top .bell{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#7b8797}
  .who{display:flex;align-items:center;gap:7px;color:var(--ink);font-weight:600;font-size:12px}
  .who .ava{background:var(--navy);color:#fff;border:none}
  /* toolbar */
  .tools{height:46px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--page)}
  .seg{display:flex;background:#eef1f5;border-radius:9px;padding:3px;gap:2px}
  .seg button{border:none;background:none;font:inherit;font-size:12px;color:#5d6a7a;padding:5px 12px;border-radius:7px;display:flex;align-items:center;gap:6px;cursor:pointer}
  .seg button.on{background:var(--navy);color:#fff}
  .seg.light button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .tsp{flex:1}
  .btn{border:1px solid var(--border);background:#fff;color:var(--ink);font:inherit;font-size:12px;padding:7px 12px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn.pri{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
  /* workspace */
  .work{flex:1;min-height:0;display:flex;gap:0;padding:0 16px 14px}
  .viewer{flex:1;min-width:0;border-radius:12px;position:relative;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 15%,var(--viewA),var(--viewB));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
  .grid{position:absolute;inset:0;background-image:
    linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
    background-size:34px 34px;transform:perspective(600px) rotateX(52deg) scale(1.6);transform-origin:50% 78%;opacity:.7}
  .pc{position:absolute;inset:0;background-image:radial-gradient(rgba(205,220,235,.62) 1px,transparent 1.5px);background-size:6px 6px;mix-blend-mode:screen;opacity:.5}
  .blob{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 32% 56%,rgba(150,180,205,.30),transparent 42%),radial-gradient(circle at 64% 46%,rgba(150,180,205,.20),transparent 40%)}
  .vtop{position:absolute;top:12px;left:12px;z-index:3}
  .vhelp{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:#ffffff22;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}
  .vbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:#ffffffee;border-radius:11px;padding:6px 8px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .vbar span{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#5d6a7a}
  .vbar span.on{background:var(--teal);color:#fff}
  .gizmo{position:absolute;bottom:12px;right:12px;width:34px;height:34px}
  /* floating obj-stats card */
  .stats{position:absolute;top:12px;right:12px;width:236px;background:#fff;border-radius:11px;box-shadow:0 8px 24px rgba(0,0,0,.22);overflow:hidden;font-size:12px;z-index:4}
  .stats .h{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid var(--border)}
  .pill{background:var(--teal);color:#fff;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px}
  .stats .h small{color:var(--mute);font-size:11px}
  .strow{display:flex;align-items:center;gap:8px;padding:7px 11px}
  .strow .ic{width:20px;height:20px;border-radius:5px;background:#eef1f5;display:flex;align-items:center;justify-content:center;color:#8b96a5;font-size:11px}
  .strow .nm{flex:1;color:#3a4655}
  .strow .ct{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .tg{width:26px;height:15px;border-radius:20px;background:#d3d9e1;position:relative;flex:none}
  .tg.on{background:var(--teal)}
  .tg::after{content:"";position:absolute;top:1.5px;width:12px;height:12px;border-radius:50%;background:#fff;left:1.5px;transition:.15s}
  .tg.on::after{left:12.5px}
  .stf{text-align:center;color:var(--navy);font-weight:600;padding:8px;border-top:1px solid var(--border);font-size:11.5px}
  /* right panel */
  .rpanel{width:250px;flex:none;background:#fff;border-radius:12px;margin-left:14px;border:1px solid var(--border);display:flex;flex-direction:column;font-size:12px;overflow:hidden}
  .rp-h{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--border);font-weight:600}
  .rp-b{padding:12px 13px;overflow:auto}
  .statgrid{padding:12px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
  .bigstat{font-size:12px;color:var(--mute)}
  .bigstat b{display:block;font-size:26px;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:2px}
  .twocol{display:flex;gap:10px}
  .twocol>div{flex:1;background:#f7f9fb;border:1px solid var(--border);border-radius:9px;padding:8px 10px}
  /* generic card / form */
  .panel{flex:1;background:#fff;border-radius:12px;border:1px solid var(--border);padding:22px 26px;overflow:auto}
  .panel h2{margin:0 0 4px;font-size:17px}
  .panel .sub{color:var(--mute);font-size:12.5px;margin-bottom:18px}
  .field{margin-bottom:16px;max-width:440px}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px}
  .sel{border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;background:#fff;font-size:13px}
  .sel .v{color:var(--ink)}
  .sel.ph .v{color:#9aa4b1}
  .note{background:#fff8e1;border:1px solid #f0e0a8;border-left:3px solid var(--amber);border-radius:8px;padding:9px 11px;font-size:11.5px;color:#7a6412;margin-top:7px}
  .note b{color:#5f4d08}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{background:#eef2f7;color:#3a4655;border-radius:20px;padding:4px 10px;font-size:11px}
  .chip.teal{background:#e2f4f1;color:var(--teal-d)}
  /* confidence + judge */
  .cf{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .cf.hi{background:#e4f6ea;color:#188a45}
  .cf.mid{background:#fdf0dc;color:#9a6510}
  .cf.lo{background:#fbe4e4;color:#b23434}
  .cf.done{background:var(--navy);color:#fff}
  .jitem{border:1px solid var(--border);border-radius:9px;padding:7px 9px;margin-bottom:7px}
  .jitem .r1{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .jitem .r1 b{font-size:12px}
  .jitem .rr{margin-left:auto}
  .jitem p{margin:0 0 5px;color:var(--mute);font-size:11px;line-height:1.4}
  .jitem .alt{background:#f2f6ff;border:1px solid #d8e3fb;border-radius:7px;padding:5px 8px;font-size:11px;color:#2b3a72;margin-bottom:6px}
  .jbtns{display:flex;gap:6px}
  .jbtns .btn{padding:4px 10px;font-size:11px;flex:1;justify-content:center}
  .chatbox{margin-top:6px;border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;padding:7px 10px;color:#9aa4b1;font-size:11.5px;gap:8px}
  .chatbox .s{margin-left:auto;background:var(--navy);color:#fff;border-radius:7px;padding:4px 9px;font-size:11px}
  /* attr panel */
  .attr .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border);font-size:12px}
  .attr .row .k{color:var(--mute)}
  .attr .row .pd{border:1px solid var(--border);border-radius:6px;padding:2px 8px;background:#fff;font-size:11.5px;display:inline-flex;gap:6px;align-items:center}
  /* iPad */
  .ipwrap{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e7ebf0,#d6dde5)}
  .ipad{width:78%;max-width:820px;aspect-ratio:4/3;background:#0e141c;border-radius:26px;padding:12px;box-shadow:0 14px 40px rgba(20,30,45,.4);position:relative}
  .ipscr{width:100%;height:100%;border-radius:16px;overflow:hidden;background:#f5f7f9;display:flex;flex-direction:column;position:relative}
  .ipbar{height:34px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;font-size:11.5px;color:var(--mute)}
  .ipbody{flex:1;min-height:0;position:relative;display:flex;flex-direction:column}
  .cam{flex:1;position:relative;background:radial-gradient(120% 120% at 50% 20%,#3f4e5f,#232f3c);overflow:hidden}
  .det{position:absolute;border:2px solid var(--teal);border-radius:4px}
  .detlab{position:absolute;background:var(--teal);color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;transform:translateY(-100%)}
  .alert{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#00000088;color:#fff;font-size:11px;padding:5px 11px;border-radius:20px;display:flex;gap:8px;align-items:center}
  .cov{position:absolute;top:10px;right:12px;background:#00000066;color:#fff;font-size:10.5px;padding:5px 9px;border-radius:9px}
  .ipctrl{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center}
  .recdot{width:44px;height:44px;border-radius:50%;background:#d64545;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3)}
  .tagbtn{background:#fff;color:var(--navy);border-radius:20px;padding:8px 13px;font-size:12px;font-weight:600;box-shadow:0 3px 10px rgba(0,0,0,.25)}
  .modecard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;width:120px;text-align:center;font-size:12px}
  .modecard.on{border-color:var(--teal);box-shadow:0 0 0 2px #15a59433}
  .modecard .em{font-size:22px;margin-bottom:4px}
  /* navigator */
  .nav-bar{flex:none;height:74px;background:#1b2430;color:#cdd6e0;display:flex;align-items:center;gap:14px;padding:0 18px}
  .nbtn{width:38px;height:38px;border-radius:10px;border:1px solid #33414f;background:#242f3d;color:#cdd6e0;font-size:16px;cursor:pointer;flex:none}
  .nbtn:disabled{opacity:.35;cursor:default}
  .ninfo{flex:1;min-width:0}
  .ninfo .t{display:flex;align-items:center;gap:9px}
  .actbadge{font-size:10px;font-weight:700;letter-spacing:.4px;color:#0e141c;background:var(--teal);padding:2px 8px;border-radius:20px}
  .ninfo .t b{color:#fff;font-size:14px}
  .ninfo .t .code{color:#7f8ea0;font-size:12px;font-variant-numeric:tabular-nums}
  .ninfo .n{color:#9fb0c2;font-size:11.5px;margin-top:3px;line-height:1.4;max-width:820px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:210px;justify-content:flex-end}
  .dots i{width:8px;height:8px;border-radius:50%;background:#3a4756;cursor:pointer}
  .dots i.on{background:var(--teal);width:18px;border-radius:5px}
  .devtag{font-size:10px;color:#7f8ea0;border:1px solid #33414f;border-radius:6px;padding:2px 7px}
  /* S11 layers / hotspots / recommend */
  .lyr{position:absolute;inset:0}
  .lyrpanel{position:absolute;top:12px;left:12px;z-index:6;background:#ffffffee;border-radius:10px;padding:9px 11px;font-size:11.5px;box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:6px;width:118px}
  .lyrrow{display:flex;align-items:center;gap:8px;cursor:pointer;color:#3a4655;user-select:none}
  .pchot{position:absolute;width:32px;height:32px;border-radius:50%;border:2px dashed #bcd3ff;cursor:pointer;z-index:4;transform:translate(-50%,-50%)}
  .pchot:hover{background:#8fb4ff40}
  .recpop{position:absolute;z-index:9;background:#fff;border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.3);padding:11px 12px;width:212px;font-size:11.5px;display:none}
  /* S11 分解ビュー */
  .s11head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);background:#fff;font-size:12px}
  .s11step{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:9px;border:1.4px solid var(--border);color:#5d6a7a;cursor:pointer;font-weight:600}
  .s11step.on{border-color:var(--teal);background:#e2f4f1;color:var(--teal-d)}
  .s11n{width:19px;height:19px;border-radius:50%;background:#c9cfd8;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .s11step.on .s11n{background:var(--teal)}
  .s11topobtn{border:none;background:var(--purple);color:#fff;font:inherit;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;box-shadow:0 3px 10px rgba(165,52,138,.32);display:inline-flex;align-items:center;gap:6px}
  .s11topobtn.done{background:#c9cfd8;box-shadow:none;cursor:default}
  .s11legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--border);background:#fff;font-size:11px;color:var(--mute)}
  .s11legend i{display:inline-block;width:20px;height:0;border-top:5px solid;vertical-align:middle;margin-right:5px;border-radius:3px}
  .meter{font-size:12px;color:var(--mute);margin:8px 0}
  .meter b{color:var(--ink)}
  .chip.btnchip{background:#fff;border:1.5px solid var(--purple);color:var(--purple);cursor:pointer;font-weight:700;padding:6px 12px}
  .chip.btnchip:hover{background:#f7e9f3}
  /* S11 検出ギャラリー（3Dイラスト）＋アニメ */
  @keyframes s11pop{0%{opacity:0;transform:scale(.55)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
  @keyframes s11spin{to{transform:rotate(360deg)}}
  .s11gallery{display:none;align-items:stretch;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:#fff;overflow-x:auto;min-height:94px}
  .s11gtitle{flex:none;display:flex;flex-direction:column;justify-content:center;gap:5px;font-size:11px;color:var(--mute);width:110px}
  .s11spin{width:13px;height:13px;border:2px solid #cfd6de;border-top-color:var(--teal);border-radius:50%;animation:s11spin .8s linear infinite;display:inline-block;vertical-align:-2px;margin-right:5px}
  .s11card{flex:none;width:82px;border:1px solid var(--border);border-radius:9px;background:#fbfcfd;display:flex;flex-direction:column;align-items:center;padding:5px 4px;transform-origin:center}
  .s11card.new{animation:s11pop .4s cubic-bezier(.2,.9,.3,1.25)}
  .s11ill{width:100%;height:44px;display:block}
  .s11card b{font-size:9.5px;font-weight:700;color:#3a4655;margin-top:3px;text-align:center;line-height:1.15}
  .s11popg{transform-box:fill-box;transform-origin:center;animation:s11pop .36s cubic-bezier(.2,.9,.3,1.25)}
  .s11btnghost{border:1px solid var(--border);background:#fff;color:#5d6a7a;font:inherit;font-size:11px;padding:4px 9px;border-radius:8px;cursor:pointer;align-self:flex-start}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div id="app">
  <div class="stage"><div class="frame-wrap" id="stageInner"></div></div>
  <div class="nav-bar">
    <button class="nbtn" id="prev">‹</button>
    <div class="ninfo">
      <div class="t"><span class="actbadge" id="act"></span><b id="title"></b><span class="code" id="code"></span><span class="devtag" id="dev"></span></div>
      <div class="n" id="note"></div>
    </div>
    <div class="dots" id="dots"></div>
    <button class="nbtn" id="next">›</button>
  </div>
</div>

<script>
const IC={
  overview:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>',
  loc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-6 7-12a7 7 0 1 0-14 0c0 6 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg>',
  issue:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>',
  set:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2.2-1.3L14 2h-4l-.4 2.2A7 7 0 0 0 7.4 5.5l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .9.1 1.3l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2.2 1.3L10 22h4l.4-2.2a7 7 0 0 0 2.2-1.3l2.3 1 2-3.4-2-1.5c.1-.4.1-.9.1-1.3z"/></svg>'
};
const giz='<svg viewBox="0 0 40 40"><line x1="20" y1="20" x2="20" y2="6" stroke="#37c26f" stroke-width="2"/><line x1="20" y1="20" x2="33" y2="27" stroke="#d64545" stroke-width="2"/><line x1="20" y1="20" x2="8" y2="27" stroke="#3b82f6" stroke-width="2"/><circle cx="20" cy="6" r="3" fill="#37c26f"/><circle cx="33" cy="27" r="3" fill="#d64545"/><circle cx="8" cy="27" r="3" fill="#3b82f6"/></svg>';

// ---- MEP ダミー（S13–14 / S15 で使用・信頼度で色分け）----
const CFC={hi:'#37c26f',mid:'#e7b53c',lo:'#e1684f'};
const MEP_PARTS=[
 {t:'p',a:[120,150,660,150],w:13,c:'hi'},
 {t:'p',a:[120,150,120,360],w:12,c:'hi'},

    human.forEach(function(f){
      h+='<div class="jitem"><div class="r1"><b>'+f.ja+'</b><span class="rr cf '+(S11.tagged[f.id]?'done':'mid')+'">'+(S11.tagged[f.id]?'確定':'要確認')+'</span></div>'
        +(S11.tagged[f.id]?'':'<div class="jbtns"><button class="btn pri s11tag" data-id="'+f.id+'">確定</button></div>')+'</div>';

      +'<button class="chip btnchip s11ch" data-n="モーター駆動ポンプ">モーター駆動ポンプ</button>'

  }else{

      +'<div style="margin-top:10px"><span class="chip" style="background:#f7e9f3;color:#8a2b73">推論</span><span class="chip" style="background:#e7f4ea;color:#256b34">人チェック→GT</span></div>';
  }

}
function s11_gallery(){
  if(S11.phase<2)return '';
  var full=(S11.phase>=3),upto=full?S11_DET.length:S11.detN,done=full||S11.detDone||upto>=S11_DET.length;
  var title=done
    ? '<div class="s11gtitle"><div style="color:var(--ok);font-weight:700">✓ 検出完了</div><div>'+S11_DET.length+'件（Vision AI）</div><button class="s11btnghost" id="s11replay">↻ 再検出</button></div>'
    : '<div class="s11gtitle"><div><span class="s11spin"></span>検出中…</div><div>'+upto+' / '+S11_DET.length+'</div></div>';
  var cards='';
  for(var d=0;d<upto;d++){var it=S11_DET[d],isNew=(!full&&d===S11.detN-1);
    cards+='<div class="s11card'+(isNew?' new':'')+'">'+s11_3d(it.card)+'<b>'+it.ja+'</b></div>';}
  return title+cards;
}
function s11_animate(){
  if(s11Timer){clearInterval(s11Timer);s11Timer=null;}
  if(S11.detN>=S11_DET.length){S11.detDone=true;return;}
  s11Timer=setInterval(function(){
    S11.detN++;
    if(S11.detN>=S11_DET.length){S11.detN=S11_DET.length;S11.detDone=true;clearInterval(s11Timer);s11Timer=null;}
    s11_render();
  },460);
}
function s11_render(){
  var head=document.getElementById('s11head');
  if(!head){if(s11Timer){clearInterval(s11Timer);s11Timer=null;}return;}
  head.innerHTML=s11_head();
  document.getElementById('s11canvas').innerHTML=s11_svg();
  var g=document.getElementById('s11gallery');
  if(g){g.style.display=(S11.phase>=2)?'flex':'none';g.innerHTML=s11_gallery();}
  document.getElementById('s11right').innerHTML=s11_panel();
  head.querySelectorAll('.s11step').forEach(function(st){st.onclick=function(){s11_setPhase(+st.dataset.ph);};});
  var tb=document.getElementById('s11topo');if(tb)tb.onclick=function(){s11_runTopo();};
  document.querySelectorAll('#s11canvas [data-fit]').forEach(function(gg){gg.onclick=function(){s11_tag(gg.getAttribute('data-fit'));};});
  var rp=document.getElementById('s11replay');if(rp)rp.onclick=function(){s11_replay();};
  var fl=document.getElementById('s11fill');if(fl)fl.onclick=function(){S11.filled=true;s11_render();};
  document.querySelectorAll('.s11tag').forEach(function(b){b.onclick=function(){s11_tag(b.dataset.id);};});
  document.querySelectorAll('.s11ch').forEach(function(b){b.onclick=function(){S11.equip=b.dataset.n;s11_render();};});
  var ap=document.getElementById('s11appr');if(ap)ap.onclick=function(){S11.nextApproved=true;s11_render();};
  var rj=document.getElementById('s11rej');if(rj)rj.onclick=function(){S11.equip=null;s11_render();};
}
function s11_setPhase(n){
  S11.phase=n;if(n>=2)S11.filled=true;
  if(n===2&&!S11.detDone){S11.detN=0;s11_render();s11_animate();return;}
  s11_render();
}
function s11_replay(){S11.detN=0;S11.detDone=false;s11_render();s11_animate();}
function s11_tag(id){var f=S11_FITT.filter(function(x){return x.id===id;})[0];if(!f||f.auto)return;S11.tagged[id]=true;s11_render();}
function s11_runTopo(){if(s11Timer){clearInterval(s11Timer);s11Timer=null;}S11.phase=3;S11.filled=true;S11.detDone=true;S11.detN=S11_DET.length;S11.topoRun=true;s11_render();}

function ipad(barTitle,inner){
  return `<div class="ipwrap"><div class="ipad"><div class="ipscr">
    <div class="ipbar">◈ InsightScanX · <b style="color:var(--ink)">${barTitle}</b><span style="margin-left:auto">🔋 iPad Pro · LiDAR</span></div>
    <div class="ipbody">${inner}</div></div></div></div>`;
}

let i=0;
const $=s=>document.querySelector(s);
function render(){
  const f=FRAMES[i];
  $('#stageInner').innerHTML=f.build();
  $('#act').textContent=f.act;$('#title').textContent=f.title;$('#code').textContent=f.code;$('#dev').textContent=f.dev;$('#note').textContent=f.note;
  $('#prev').disabled=i===0;$('#next').disabled=i===FRAMES.length-1;
  $('#dots').innerHTML=FRAMES.map((_,k)=>`<i class="${k===i?'on':''}" data-k="${k}"></i>`).join('');
  document.querySelectorAll('.dots i').forEach(d=>d.onclick=()=>{i=+d.dataset.k;render()});
  if(f.after)f.after();
}
$('#prev').onclick=()=>{if(i>0){i--;render()}};
$('#next').onclick=()=>{if(i<FRAMES.length-1){i++;render()}};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'&&i>0){i--;render()}if(e.key==='ArrowRight'&&i<FRAMES.length-1){i++;render()}});
render();
</script>
